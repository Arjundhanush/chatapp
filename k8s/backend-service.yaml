##############################################
# Service — Backend API (ClusterIP, internal)
##############################################
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: todo-app
    component: backend
spec:
  type: ClusterIP
  selector:
    app: todo-app
    component: backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
