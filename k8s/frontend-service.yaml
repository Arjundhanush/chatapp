##############################################
# Service — Frontend (NodePort, external access)
##############################################
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: todo-app
    component: frontend
spec:
  type: NodePort
  selector:
    app: todo-app
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
